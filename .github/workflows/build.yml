name: Build FAP

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ufbt
        run: pip install ufbt

      - name: Build FAP
        run: ufbt

      - name: Upload FAP artifact
        uses: actions/upload-artifact@v4
        with:
          name: ir-scanner-fap
          path: dist/
          if-no-files-found: error
